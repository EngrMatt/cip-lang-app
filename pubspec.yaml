name: cip_lang_app
description: 田野語料收集 Flutter App（iOS + Android 純前端）
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  record: ^6.0.0
  just_audio: ^0.9.46
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  intl: ^0.20.2
  permission_handler: ^11.4.0
  shared_preferences: ^2.5.3
  audio_waveforms: ^1.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_cropper: ^9.1.0
  uuid: ^4.5.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/icom.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
